            font-weight: 700;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;

        .btn-solid:hover {

            transform: scale(0.98);

        .btn-solid:disabled {

            inset: 0;

        }

        .sidebar-backdrop {

            background: rgba(0, 0, 0, 0.4);

        }

        .sidebar-content {
            width: 320px;
            height: 100%;
            background: #f0f7f7;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            animation: slideRight 0.3s ease-out;
            border-right: 2px solid #7aa2a1;
        }

        .dark .sidebar-content {
            background: #1e293b;
            border-color: #334155;
        }

        @keyframes slideRight {
            from {
                transform: translateX(-100%);
            }
            to {
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%,
            100% {
                transform: translateY(-25%);
            }
            50% {
                transform: translateY(0);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.2s ease-out;
        }

        .animate-bounce {
            animation: bounce 1s infinite;
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

            background: linear-gradient(135deg, #7aa2a1, #4c7271);

            color: white;
            font-weight: 700;
            padding: 16px 24px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid #4ade80;
            animation: bounce 1s infinite;

            height: 18px;

            align-items: center;
            justify-content: center;

            text-align: left;
            padding: 12px 16px;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            background: transparent;
            border: none;
            cursor: pointer;

            color: #e2e8f0;
        }

        .menu-item:hover {

        }

            background: #334155;

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
        }

        @media (min-width: 640px) {
            .dashboard-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .dashboard-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            border-radius: 16px;
            aspect-ratio: 1;
            background: #7aa2a1;
            color: white;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            text-align: center;
        }

        .dashboard-item:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(122, 162, 161, 0.3);
        }

        .dashboard-item:active {
            transform: scale(0.95);
        }

            background: #334155;
        }

        .dark .dashboard-item:hover {
            background: #475569;
        }

            font-size: 36px;
            margin-bottom: 12px;
        }

        .dashboard-item span {
            font-size: 11px;
            font-weight: 700;
            white-space: pre-line;
            line-height: 1.4;
        }

        .question-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
        }

        @media (max-width: 640px) {
            .question-grid {
                grid-template-columns: repeat(5, 1fr);
            }

            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 900;
            color: white;
            cursor: pointer;
        }

        .question-item.correct {
            background: #22c55e;
        }

        .question-item.wrong {
            background: #ef4444;
        }

        .step-indicator {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            margin-bottom: 32px;
            padding: 0 16px;
            position: relative;
        }

        .step-indicator .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .step-indicator .step .circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
            transition: all 0.5s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .step-indicator .step .circle.active {
            background: #7aa2a1;
            color: white;
        }

        .step-indicator .step .circle.inactive {
            background: #e5e7eb;
            color: #9ca3af;
        }

        .step-indicator .step .label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 8px;
            position: absolute;
            bottom: -24px;
            width: 96px;
            text-align: center;
        }

        .step-indicator .step .label.active {
            color: #7aa2a1;
        }

        .step-indicator .step .label.inactive {
            color: #9ca3af;
        }

        .step-indicator .progress-bar {
            position: absolute;
            top: 20px;
            left: 15%;
            right: 15%;
            height: 4px;
            background: #e5e7eb;
            z-index: 0;
        }

        .step-indicator .progress-bar .fill {
            height: 100%;
            background: #7aa2a1;
            transition: width 0.5s;
        }

        .toggle-switch {
            width: 32px;
            height: 16px;
            border-radius: 9999px;
            padding: 2px;
            transition: background-color 0.3s;

        }

        .toggle-switch.active {
            background: #7aa2a1;
        }

        .toggle-switch.inactive {
            background: #d1d5db;

            height: 12px;
            border-radius: 50%;
            background: white;
            transition: transform 0.3s;
        }

        .toggle-switch.active .toggle-dot {
            transform: translateX(16px);
        }

            align-items: center;
            justify-content: center;
        }

            margin-bottom: 0;

        function getStatusColor(status) {
            var map = { success: 'bg-green-500', warning: 'bg-yellow-500', danger: 'bg-red-500' };
            return map[status] || 'bg-gray-500';
        }

        function getGradeColor(grade) {
            if (grade >= 7.0) return 'text-green-500';
            if (grade >= 5.0) return 'text-yellow-500';
            return 'text-red-500';
        }

        function generateId() {

        function getRandomDetails(count) {
            var arr = [];
            for (var i = 0; i < count; i++) {
                arr.push(Math.random() > 0.3 ? 1 : 0);
            }
            return arr;
        }

        function getInitials(name) {
            if (!name) return '?';
            var parts = name.split(' ');
            if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
            return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
        }

        // ============================================================
        // CÁLCULO DE PRESENÇA
        // ============================================================
        function calcularPresencaAluno(student, totalAulas) {
            if (!totalAulas || totalAulas === 0) {
                student.presencas = 0;
                student.faltas = 0;
                return 0;
            }
            var presencas = totalAulas - (student.faltas || 0);
            if (presencas < 0) presencas = 0;
            student.presencas = presencas;
            return Math.round((presencas / totalAulas) * 100);
        }

        function getPresencaClass(percentual) {
            if (percentual >= 75) return 'alta';
            if (percentual >= 50) return 'media';
            return 'baixa';
        }

        function calcularEstatisticasTurma(students, totalAulas) {
            if (!students || students.length === 0) {
                return {
                    averageAttendance: '0%',
                    worstQuestion: '-',
                    heatmap: { 'Interpretação': 0, 'Gramática': 0, 'Pontuação': 0, 'Ortografia': 0 }
                };
            }

            var totalGpa = 0;
            var totalSuccess = 0;
            var totalPresencas = 0;
            var heatmap = { 'Interpretação': 0, 'Gramática': 0, 'Pontuação': 0, 'Ortografia': 0 };

            for (var i = 0; i < students.length; i++) {
                var s = students[i];
                totalGpa += s.gpa || 0;
                totalSuccess += s.successRate || 0;
                var presencaPercent = calcularPresencaAluno(s, totalAulas);
                totalPresencas += presencaPercent;
            }

            var avgGpa = (totalGpa / students.length).toFixed(1);
            var avgSuccess = Math.round(totalSuccess / students.length);
            var avgPresenca = students.length > 0 ? Math.round(totalPresencas / students.length) : 0;

            var worstQuestion = '-';
            var minGrade = 10;
            for (var j = 0; j < students.length; j++) {
                var hist = students[j].history || [];
                for (var k = 0; k < hist.length; k++) {
                    if (hist[k].grade < minGrade) {
                        minGrade = hist[k].grade;
                        worstQuestion = hist[k].title || 'Questão';
                    }
                }
            }

            return {
                averageAttendance: avgPresenca + '%',
                worstQuestion: worstQuestion,
                heatmap: {
                    'Interpretação': Math.round(avgSuccess * 0.85),
                    'Gramática': Math.round(avgSuccess * 0.72),
                    'Pontuação': Math.round(avgSuccess * 0.78),
                    'Ortografia': Math.round(avgSuccess * 0.92)
                }
            };
        }

        function calculateStudentStats(student) {
            var history = student.history || [];
            var total = history.length;

            if (total === 0) {
                return {
                    gpa: 0,
                    lastGrade: 0,
                    testCount: 0,
                    successRate: 0,
                    trend: 'up'
                };
            }

            var sum = 0;
            var successSum = 0;
            var last = history[history.length - 1] || { grade: 0, correct: 0, wrong: 0 };

            for (var i = 0; i < history.length; i++) {
                sum += history[i].grade || 0;
                var totalQ = (history[i].correct || 0) + (history[i].wrong || 0);
                if (totalQ > 0) {
                    successSum += ((history[i].correct || 0) / totalQ) * 100;
                }
            }

            var gpa = parseFloat((sum / total).toFixed(1));
            var successRate = Math.round(successSum / total);

            return {
                gpa: gpa,
                lastGrade: last.grade || 0,
                testCount: total,
                successRate: successRate,
                trend: 'up'
            };
        }

        function updateStudentStats(student) {
            var stats = calculateStudentStats(student);
            student.gpa = stats.gpa;
            student.lastGrade = stats.lastGrade;
            student.testCount = stats.testCount;
            student.successRate = stats.successRate;
            return student;
        }

                '<h2 class="text-gray-400 dark:text-gray-500 font-bold text-xs tracking-widest uppercase mb-6 self-start flex items-center gap-2">' +
                '<i class="fas fa-sparkles text-[#7aa2a1]"></i> Painel de ferramentas do docente</h2>' +
                '<div class="dashboard-grid">' + itemsHtml + '</div></div></div>';
        }

        function markAllRead() {
            for (var i = 0; i < App.notifications.length; i++) {
                App.notifications[i].unread = false;
            }
            App.showNotifications = false;
            render();
        }

        // ============================================================
        // PROFILE
        // ============================================================
        function renderProfile() {
            var profileImg = App.profileImage ?
                '<img src="' + App.profileImage + '" alt="Perfil" class="w-full h-full object-cover" />' :
                '<i class="fas fa-user text-6xl text-gray-400"></i>';

            return '<div class="flex-1 flex flex-col p-6 md:p-10 bg-white dark:bg-slate-800 max-w-2xl mx-auto w-full">' +
                '<div class="flex items-center justify-between mb-8">' +
                '<button onclick="navigateTo(\'dashboard\')" class="text-gray-400 hover:text-black dark:hover:text-white p-2 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-full transition-colors"><i class="fas fa-arrow-left text-2xl"></i></button>' +
                '<h2 class="text-xl font-bold text-gray-700 dark:text-slate-100">O Meu Perfil</h2><div class="w-10"></div>' +
                '</div>' +
                '<div class="flex flex-col items-center mb-8">' +
                '<div class="relative group cursor-pointer" onclick="document.getElementById(\'profileInput\').click()">' +
                '<div class="w-32 h-32 bg-gray-200 dark:bg-slate-700 rounded-full flex items-center justify-center overflow-hidden border-4 border-[#e8f1f1] dark:border-slate-700 shadow-md">' +
                profileImg +
                '</div>' +
                '<div class="absolute bottom-1 right-1 bg-[#7aa2a1] text-white p-2 rounded-full shadow border-2 border-white hover:bg-[#688f8e] transition-colors"><i class="fas fa-camera text-sm"></i></div>' +
                '</div>' +
                '<p class="text-xs text-gray-400 dark:text-gray-500 mt-3 font-semibold">Clique para alterar a imagem de perfil</p>' +
                '<input type="file" id="profileInput" class="hidden" accept="image/*" onchange="handleProfileImage(event)" />' +
                '</div>' +
                '<div class="space-y-4 max-w-md mx-auto w-full">' +
                '<div><label class="text-xs font-bold text-gray-500 dark:text-gray-400 ml-1 mb-1.5 block">Nome do Docente</label><input type="text" class="input-style" value="' +
                App.profileName + '" onchange="App.profileName=this.value" /></div>' +
                '<div><label class="text-xs font-bold text-gray-500 dark:text-gray-400 ml-1 mb-1.5 block">Biografia / Escola</label><input type="text" class="input-style" value="' +
                App.profileBio + '" onchange="App.profileBio=this.value" /></div>' +
                '<div><label class="text-xs font-bold text-gray-500 dark:text-gray-400 ml-1 mb-1.5 block">E-mail de Contacto</label><input type="email" class="input-style" value="' +
                App.profileEmail + '" onchange="App.profileEmail=this.value" /></div>' +
                '<div class="pt-6"><button onclick="navigateTo(\'dashboard\')" class="btn-solid">Guardar Alterações</button></div>' +
                '</div></div>';
        }

        function handleProfileImage(event) {
            var file = event.target.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onloadend = function() {
                    App.profileImage = reader.result;
                    render();
                };
                reader.readAsDataURL(file);
            }
        }

        // ============================================================
        // SALAS
        // ============================================================
        function renderSalas() {
            var classesHtml = '';
            for (var i = 0; i < App.classes.length; i++) {
                var c = App.classes[i];
                var totalAulas = c.totalAulas || 0;
                var presencaMedia = 0;
                if (c.students && c.students.length > 0) {
                    var totalPres = 0;
                    for (var si = 0; si < c.students.length; si++) {
                        var pres = calcularPresencaAluno(c.students[si], totalAulas);
                        totalPres += pres;
                    }
                    presencaMedia = Math.round(totalPres / c.students.length);
                }
                var presencaClass = getPresencaClass(presencaMedia);
                var presencaBadge = '<span class="presenca-badge ' + presencaClass + '"><i class="fas fa-user-check"></i> ' +
                    presencaMedia + '%</span>';

                classesHtml +=
                    '<div class="bg-white dark:bg-slate-700 rounded-3xl p-6 shadow-sm border border-gray-100 dark:border-slate-600 flex flex-col justify-between relative overflow-hidden hover:shadow-md transition-shadow">' +
                    '<div class="absolute top-0 left-0 w-2 h-full ' + getStatusColor(c.status) + '"></div>' +
                    '<div class="pl-3">' +
                    '<div class="flex justify-between items-start mb-2"><h4 class="text-lg font-black text-gray-800 dark:text-white">' +
                    c.name + '</h4><span class="w-3.5 h-3.5 rounded-full ' + getStatusColor(c.status) +
                    '"></span></div>' +
                    '<p class="text-xs text-gray-500 dark:text-gray-400 font-semibold mb-1">Média Geral: <span class="text-gray-800 dark:text-gray-100 font-bold">' +
                    c.average + ' / 10</span></p>' +
                    '<p class="text-xs text-gray-500 dark:text-gray-400 mb-1">Total Alunos: <span class="text-gray-800 dark:text-gray-100 font-bold">' +
                    c.studentCount + ' matriculados</span></p>' +
                    '<p class="text-xs text-gray-500 dark:text-gray-400 mb-1 flex items-center gap-2">Presença Média: ' +
                    presencaBadge + '</p>' +
                    '<p class="text-xs text-gray-400 dark:text-gray-500 truncate">Atividade Recente: ' + c
                    .lastActivity + '</p></div>' +
                    '<div class="grid grid-cols-2 gap-2 mt-6 pt-4 border-t border-gray-100 dark:border-slate-600 pl-3">' +
                    '<button onclick="selectClass(\'' + c.id +
                    '\')" class="py-2.5 px-3 bg-[#e8f1f1] dark:bg-slate-600 text-[#7aa2a1] dark:text-slate-100 text-xs font-bold rounded-xl hover:opacity-80 transition-opacity">Ver Alunos</button>' +
                    '<button onclick="selectClassAndNavigate(\'' + c.id +
                    '\',\'relatorios\')" class="py-2.5 px-3 bg-gray-50 dark:bg-slate-600/50 text-gray-600 dark:text-slate-300 text-xs font-bold rounded-xl hover:opacity-80 transition-opacity">Relatórios</button>' +
                    '</div></div>';
            }

            return '<div class="flex-1 flex flex-col bg-white dark:bg-slate-800 max-w-4xl mx-auto w-full">' +
                renderSimpleHeader('Salas & Turmas') +
                '<div class="p-6 md:p-8 flex-1">' +
                '<div class="flex justify-between items-center mb-6">' +
                '<h3 class="text-gray-400 dark:text-gray-500 font-bold text-xs tracking-widest uppercase">As minhas turmas ativas</h3>' +
                '<button onclick="navigateTo(\'nova-turma\')" class="flex items-center gap-1 text-xs font-black uppercase text-[#7aa2a1] hover:underline"><i class="fas fa-plus"></i> Nova Turma</button>' +
                '</div>' +
                '<div class="grid md:grid-cols-2 gap-6">' + classesHtml + '</div></div></div>';
        }

        function selectClass(classId) {
            for (var i = 0; i < App.classes.length; i++) {
                if (App.classes[i].id === classId) {
                    App.selectedClass = App.classes[i];
                    App.showStatsTab = false;
                    navigateTo('sala-detalhe');
                    return;
                }
            }
        }

        function selectClassAndNavigate(classId, view) {
            for (var i = 0; i < App.classes.length; i++) {
                if (App.classes[i].id === classId) {
                    App.selectedClass = App.classes[i];
                    navigateTo(view);
                    return;
                }
            }
        }

        // ============================================================
        // SALA DETALHE - COM REGISTRO DE FALTA E PRESENÇA
        // ============================================================
        function renderSalaDetalhe() {
            var cls = App.selectedClass;
            if (!cls) return '<div class="p-8 text-center">Turma não encontrada</div>';

            var totalAulas = cls.totalAulas || 0;
            var stats = calcularEstatisticasTurma(cls.students || [], totalAulas);
            cls.statistics = stats;

            var students = getSortedStudents(cls.students || []);
            var showStats = App.showStatsTab;

            // Modal de Falta
            var modalFaltaHtml = '';
            if (App.mostrarModalFalta) {
                var alunoSelecionado = null;
                for (var mi = 0; mi < students.length; mi++) {
                    if (students[mi].id === App.registroFalta.alunoId) {
                        alunoSelecionado = students[mi];
                        break;
                    }
                }
                if (alunoSelecionado) {
                    modalFaltaHtml =
                        '<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">' +
                        '<div class="bg-white dark:bg-slate-800 rounded-3xl p-6 max-w-md w-full shadow-2xl">' +
                        '<h3 class="text-lg font-black text-gray-800 dark:text-white mb-4"><i class="fas fa-user-slash text-red-500"></i> Registrar Falta</h3>' +
                        '<p class="text-sm text-gray-600 dark:text-gray-300 mb-4">Aluno: <strong>' + alunoSelecionado
                        .name + '</strong></p>' +
                        '<p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Faltas atuais: <strong>' + (alunoSelecionado
                            .faltas || 0) + '</strong></p>' +
                        '<div class="space-y-4">' +
                        '<div><label class="text-xs font-bold text-gray-500 dark:text-gray-400 mb-1.5 block">Quantidade de Faltas</label>' +
                        '<input type="number" class="input-style" value="' + App.registroFalta.quantidade +
                        '" min="1" max="10" onchange="App.registroFalta.quantidade=parseInt(this.value)||1" /></div>' +
                        '<div><label class="text-xs font-bold text-gray-500 dark:text-gray-400 mb-1.5 block">Data</label>' +
                        '<input type="date" class="input-style" value="' + (App.registroFalta.data || new Date()
                            .toISOString().split('T')[0]) +
                        '" onchange="App.registroFalta.data=this.value" /></div>' +
                        '</div>' +
                        '<div class="flex gap-3 mt-6">' +
                        '<button onclick="confirmarFalta()" class="flex-1 btn-solid bg-red-500 hover:bg-red-600">Confirmar Falta</button>' +
                        '<button onclick="cancelarFalta()" class="flex-1 btn-secondary">Cancelar</button>' +
                        '</div></div></div>';
                }
            }

            // Modal de Presença
            var modalPresencaHtml = '';
            if (App.mostrarModalPresenca) {
                var alunoSelecionado2 = null;
                for (var mi2 = 0; mi2 < students.length; mi2++) {
                    if (students[mi2].id === App.registroPresenca.alunoId) {
                        alunoSelecionado2 = students[mi2];
                        break;
                    }
                }
                if (alunoSelecionado2) {
                    modalPresencaHtml =
                        '<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">' +
                        '<div class="bg-white dark:bg-slate-800 rounded-3xl p-6 max-w-md w-full shadow-2xl">' +
                        '<h3 class="text-lg font-black text-gray-800 dark:text-white mb-4"><i class="fas fa-user-check text-green-500"></i> Registrar Presença</h3>' +
                        '<p class="text-sm text-gray-600 dark:text-gray-300 mb-4">Aluno: <strong>' + alunoSelecionado2
                        .name + '</strong></p>' +
                        '<p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Presenças atuais: <strong>' + (alunoSelecionado2
                            .presencas || 0) + '</strong></p>' +
                        '<div class="space-y-4">' +
                        '<div><label class="text-xs font-bold text-gray-500 dark:text-gray-400 mb-1.5 block">Quantidade de Presenças</label>' +
                        '<input type="number" class="input-style" value="' + App.registroPresenca.quantidade +
                        '" min="1" max="10" onchange="App.registroPresenca.quantidade=parseInt(this.value)||1" /></div>' +
                        '<div><label class="text-xs font-bold text-gray-500 dark:text-gray-400 mb-1.5 block">Data</label>' +
                        '<input type="date" class="input-style" value="' + (App.registroPresenca.data || new Date()
                            .toISOString().split('T')[0]) +
                        '" onchange="App.registroPresenca.data=this.value" /></div>' +
                        '</div>' +
                        '<div class="flex gap-3 mt-6">' +
                        '<button onclick="confirmarPresenca()" class="flex-1 btn-solid bg-green-500 hover:bg-green-600">Confirmar Presença</button>' +
                        '<button onclick="cancelarPresenca()" class="flex-1 btn-secondary">Cancelar</button>' +
                        '</div></div></div>';
                }
            }

            var contentHtml = '';
            if (!showStats) {
                var studentsHtml = '';
                if (students.length > 0) {
                    for (var si = 0; si < students.length; si++) {
                        var s = students[si];
                        var trendIcon = s.trend === 'up' ? '<i class="fas fa-arrow-up text-green-500"></i>' :
                            '<i class="fas fa-arrow-down text-red-500"></i>';
                        var bars = '';
                        var hist = s.history || [];
                        var limit = Math.min(4, hist.length);
                        for (var hi = hist.length - 1; hi >= Math.max(0, hist.length - 4); hi--) {
                            var grade = hist[hi].grade;
                            var color = grade >= 7.0 ? 'bg-green-400' : 'bg-red-400';
                            bars += '<div class="w-3.5 rounded-t-sm transition-all ' + color +
                                '" style="height:' + (grade * 10) + '%;" title="Nota: ' + grade + '"></div>';
                        }
                        var initials = getInitials(s.name);
                        var presencaPercent = calcularPresencaAluno(s, totalAulas);
                        var presencaClass = getPresencaClass(presencaPercent);
                        var presencaBadge = '<span class="presenca-badge ' + presencaClass + '">' + presencaPercent +
                            '% (' + s.presencas + '/' + totalAulas + ')</span>';

                        studentsHtml +=
                            '<div class="bg-white dark:bg-slate-700 border border-gray-100 dark:border-slate-600 rounded-3xl p-5 shadow-sm hover:shadow-md transition-all flex flex-col sm:flex-row items-center justify-between gap-4">' +
                            '<div class="flex items-center gap-4 w-full sm:w-auto">' +
                            '<div class="student-avatar-placeholder">' + initials + '</div>' +
                            '<div><h4 class="font-black text-gray-800 dark:text-white flex items-center gap-1.5">' +
                            s.name + ' ' + trendIcon +
                            '</h4><p class="text-xs text-gray-400 dark:text-gray-500 font-bold uppercase mt-0.5">Nº ' +
                            s.number + ' | ' + s.testCount + ' provas</p>' +
                            '<div class="flex items-center gap-2 mt-1">' + presencaBadge +
                            ' | Faltas: ' + (s.faltas || 0) +
                            '</div></div></div>' +
                            '<div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end">' +
                            '<div class="flex items-end gap-1.5 h-10 w-24">' + bars + '</div>' +
                            '<div class="text-right"><p class="text-[10px] text-gray-400 dark:text-gray-500 font-bold uppercase">Média</p><p class="text-lg font-black ' +
                            getGradeColor(s.gpa) + '">' + s.gpa + '</p></div>' +
                            '<div class="flex flex-wrap gap-1">' +
                            '<button onclick="abrirModalFalta(\'' + s.id +
                            '\')" class="btn-danger text-xs py-1 px-2"><i class="fas fa-user-slash"></i></button>' +
                            '<button onclick="abrirModalPresenca(\'' + s.id +
                            '\')" class="btn-success text-xs py-1 px-2"><i class="fas fa-user-check"></i></button>' +
                            '<button onclick="selectStudent(\'' + s.id +
                            '\')" class="btn-secondary text-xs py-1 px-2"><i class="fas fa-eye"></i></button>' +
                            '</div></div></div>';
                    }
                } else {
                    studentsHtml =
                        '<div class="text-center py-12 text-gray-400 dark:text-gray-500 flex flex-col items-center"><i class="fas fa-exclamation-circle text-5xl mb-2"></i><p class="font-bold">Nenhum aluno encontrado</p></div>';
                }

                contentHtml =
                    '<div class="p-6 flex-1 flex flex-col gap-6">' +
                    '<div class="flex flex-col sm:flex-row gap-4">' +
                    '<div class="relative flex-1"><i class="fas fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>' +
                    '<input type="text" placeholder="Pesquisar aluno..." class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-slate-700 dark:text-white rounded-2xl outline-none focus:ring-2 focus:ring-[#7aa2a1]" value="' +
                    App.searchQuery + '" oninput="App.searchQuery=this.value;render();" /></div>' +
                    '<div class="flex items-center gap-2 bg-gray-50 dark:bg-slate-700 rounded-2xl px-4 py-2.5">' +
                    '<i class="fas fa-sliders-h text-[#7aa2a1]"></i>' +
                    '<select class="bg-transparent text-xs font-bold text-gray-600 dark:text-slate-300 outline-none" value="' +
                    App.activeSort + '" onchange="App.activeSort=this.value;render();">' +
                    '<option value="alfabetica">Ordem Alfabética</option>' +
                    '<option value="melhor-desempenho">Melhor Desempenho</option>' +
                    '<option value="pior-desempenho">Pior Desempenho</option>' +
                    '<option value="media">Última Nota</option>' +
                    '<option value="frequencia">Taxa de Acertos</option>' +
                    '</select></div></div>' +
                    '<div class="flex flex-wrap gap-2 items-center">' +
                    '<button onclick="adicionarAula()" class="btn-success text-xs py-2 px-4"><i class="fas fa-plus"></i> Registrar Aula</button>' +
                    '<span class="text-xs text-gray-500 dark:text-gray-400">Total de aulas: ' + totalAulas +
                    '</span>' +
                    '<span class="text-xs text-gray-500 dark:text-gray-400">| Presença média: ' + stats
                    .averageAttendance + '</span>' +
                    '</div>' +
                    '<div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">' +
                    ['todos', 'aprovados', 'recuperacao', 'melhorando', 'queda'].map(function(f) {
                        var labels = { todos: 'Todos', aprovados: 'Aprovados (≥7.0)',
                            recuperacao: 'Recuperação (<7.0)', melhorando: 'Em Crescimento',
                            queda: 'Em Queda' };
                        var active = App.activeFilter === f ? 'bg-[#7aa2a1] text-white' :
                            'bg-[#e8f1f1] dark:bg-slate-700 text-[#7aa2a1] dark:text-slate-300';
                        return '<button onclick="App.activeFilter=\'' + f +
                            '\';render();" class="px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-colors ' +
                            active + '">' + labels[f] + '</button>';
                    }).join('') +
                    '</div>' +
                    '<div class="space-y-4">' + studentsHtml + '</div></div>';
            } else {
                var heatmap = cls.statistics.heatmap || {};
                var heatmapHtml = '';
                for (var key in heatmap) {
                    var val = heatmap[key];
                    var colorClass = val >= 75 ? 'bg-green-500' : (val >= 60 ? 'bg-yellow-500' : 'bg-red-500');
                    heatmapHtml +=
                        '<div><div class="flex justify-between text-xs font-bold text-gray-600 dark:text-slate-300 mb-1"><span>' +
                        key + '</span><span>' + val + '% Proficiência</span></div>' +
                        '<div class="w-full bg-gray-100 dark:bg-slate-600 h-3 rounded-full overflow-hidden"><div class="h-full rounded-full transition-all duration-500 ' +
                        colorClass + '" style="width:' + val + '%"></div></div></div>';
                }

                contentHtml =
                    '<div class="p-6 flex-1 space-y-8 overflow-y-auto">' +
                    '<div class="grid grid-cols-2 gap-4">' +
                    '<div class="bg-white dark:bg-slate-700 p-5 rounded-3xl border dark:border-slate-600 text-center"><span class="text-xs text-gray-400 dark:text-gray-500 font-bold uppercase">Presença Média</span><h4 class="text-3xl font-black text-[#7aa2a1] mt-1">' +
                    cls.statistics.averageAttendance + '</h4></div>' +
                    '<div class="bg-white dark:bg-slate-700 p-5 rounded-3xl border dark:border-slate-600 text-center"><span class="text-xs text-gray-400 dark:text-gray-500 font-bold uppercase">Questão Crítica</span><h4 class="text-sm font-black text-red-500 mt-2">' +
                    cls.statistics.worstQuestion + '</h4></div></div>' +
                    '<div class="bg-white dark:bg-slate-700 p-6 rounded-3xl border dark:border-slate-600"><h4 class="text-xs font-black tracking-widest text-gray-400 dark:text-gray-500 uppercase mb-4">Heatmap de Dificuldades por Conteúdo</h4><div class="space-y-4">' +
                    heatmapHtml + '</div></div>' +
                    '<div class="bg-indigo-50 dark:bg-indigo-950/30 border border-indigo-100 dark:border-indigo-900/50 p-6 rounded-3xl">' +
                    '<h4 class="text-sm font-black text-indigo-950 dark:text-indigo-400 uppercase mb-2 flex items-center gap-2"><i class="fas fa-sparkles"></i> Diagnóstico Geral da Turma (IA)</h4>' +
                    '<p class="text-xs text-indigo-900 dark:text-indigo-300 leading-relaxed">As pontuações sugerem que a turma demonstra sólida compreensão em Ortografia e Sintaxe. Contudo, há um défice registado em estruturas gramaticais complexas. Recomenda-se reforço direcionado.</p>' +
                    '</div></div>';
            }

            return '<div class="flex-1 flex flex-col bg-white dark:bg-slate-800 max-w-4xl mx-auto w-full">' +
                '<div class="flex items-center justify-between p-6 border-b border-gray-100 dark:border-slate-700 bg-white dark:bg-slate-800 sticky top-0 z-10">' +
                '<button onclick="navigateTo(\'salas\')" class="text-gray-400 hover:text-black dark:hover:text-white p-2 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-full transition-colors"><i class="fas fa-arrow-left text-2xl"></i></button>' +
                '<div class="text-center"><h2 class="text-lg font-black text-gray-800 dark:text-slate-100">' +
                cls.name + '</h2><p class="text-xs text-gray-400 dark:text-gray-500 font-bold uppercase mt-0.5">Média: ' +
                cls.average + '/10 | Aulas: ' + totalAulas + ' | Presença: ' + stats.averageAttendance +
                '</p></div>' +
                '<div class="w-10"></div></div>' +
                '<div class="flex border-b dark:border-slate-700">' +
                '<button onclick="App.showStatsTab=false;render();" class="flex-1 py-4 text-center font-bold text-xs uppercase tracking-wider transition-colors ' +
                (!App.showStatsTab ? 'text-[#7aa2a1] border-b-2 border-[#7aa2a1]' :
                    'text-gray-400 hover:bg-gray-50 dark:hover:bg-slate-700/50') +
                '">Alunos (' + students.length + ')</button>' +
                '<button onclick="App.showStatsTab=true;render();" class="flex-1 py-4 text-center font-bold text-xs uppercase tracking-wider transition-colors ' +
                (App.showStatsTab ? 'text-[#7aa2a1] border-b-2 border-[#7aa2a1]' :
                    'text-gray-400 hover:bg-gray-50 dark:hover:bg-slate-700/50') +
                '">Estatísticas & Análise</button></div>' +
                contentHtml +
                modalFaltaHtml +
                modalPresencaHtml +
                '</div>';
        }

        // ============================================================
        // FUNÇÕES DE PRESENÇA E FALTAS
        // ============================================================
        function adicionarAula() {
            var cls = App.selectedClass;
            if (!cls) return;

            cls.totalAulas = (cls.totalAulas || 0) + 1;

            for (var i = 0; i < cls.students.length; i++) {

                if (App.classes[j].id === cls.id) {

            render();

        function getSortedStudents(list) {
            var result = (list || []).slice();
            var filter = App.activeFilter;
            var search = App.searchQuery.toLowerCase();

            if (filter === 'aprovados') result = result.filter(function(s) { return s.gpa >= 7.0; });
            else if (filter === 'recuperacao') result = result.filter(function(s) { return s.gpa < 7.0; });
            else if (filter === 'melhorando') result = result.filter(function(s) { return s.trend === 'up'; });
            else if (filter === 'queda') result = result.filter(function(s) { return s.trend === 'down'; });

            if (search) result = result.filter(function(s) { return s.name.toLowerCase().indexOf(search) !== -1; });

            switch (App.activeSort) {
                case 'alfabetica':
                    return result.sort(function(a, b) { return a.name.localeCompare(b.name); });
                case 'melhor-desempenho':
                    return result.sort(function(a, b) { return b.gpa - a.gpa; });
                case 'pior-desempenho':
                    return result.sort(function(a, b) { return a.gpa - b.gpa; });
                case 'media':
                    return result.sort(function(a, b) { return b.lastGrade - a.lastGrade; });
                case 'frequencia':
                    return result.sort(function(a, b) { return b.successRate - a.successRate; });
                default:
                    return result;
            }
        }

        function adicionarAluno() {
            var novoAluno = {
                id: generateId(),
                number: (App.novaTurma.alunos || []).length + 1,
                name: 'Aluno ' + ((App.novaTurma.alunos || []).length + 1),
                gpa: 0,
                lastGrade: 0,
                testCount: 0,
                successRate: 0,
                trend: 'up',
                faltas: 0,
                presencas: 0,
                history: []
            };
            App.novaTurma.alunos.push(novoAluno);
            render();
        }

        function removerAluno(id) {
            if (confirm('Deseja remover este aluno?')) {
                App.novaTurma.alunos = App.novaTurma.alunos.filter(function(a) { return a.id !== id; });
                for (var i = 0; i < App.novaTurma.alunos.length; i++) {
                    App.novaTurma.alunos[i].number = i + 1;
                }
                render();
            }
        }

        function editarAluno(id) {
            var aluno = null;
            for (var i = 0; i < App.novaTurma.alunos.length; i++) {
                if (App.novaTurma.alunos[i].id === id) {
                    aluno = App.novaTurma.alunos[i];
                    break;
                }
            }
            if (!aluno) return;

            var novoNome = prompt('Nome do aluno:', aluno.name);
            if (novoNome !== null && novoNome.trim()) {
                aluno.name = novoNome.trim();
            }

            var novaNota = prompt('Média Geral (0-10):', aluno.gpa);
            if (novaNota !== null) {
                var gpa = parseFloat(novaNota);
                if (!isNaN(gpa) && gpa >= 0 && gpa <= 10) {
                    aluno.gpa = gpa;
                    aluno.lastGrade = gpa;
                    var stats = calculateStudentStats(aluno);
                    aluno.successRate = stats.successRate;
                    aluno.testCount = stats.testCount;
                }
            }

            render();
        }

        function adicionarProvaManual() {
            var prova = App.novaProva;
            if (!prova.title.trim()) {
                alert('Por favor, insira um título para a prova.');
                return;
            }
            if (prova.grade <= 0) {
                alert('Por favor, insira uma nota válida.');
                return;
            }

            var alunos = App.novaTurma.alunos || [];
            if (alunos.length === 0) {
                alert('Adicione alunos primeiro.');
                return;
            }

            for (var i = 0; i < alunos.length; i++) {
                var novoTeste = {
                    id: 'manual-' + Date.now() + '-' + i,
                    title: prova.title,
                    grade: prova.grade,
                    date: prova.date || new Date().toLocaleDateString('pt-PT'),
                    correct: prova.correct || 0,
                    wrong: prova.wrong || 0,
                    details: getRandomDetails(20)
                };

                alunos[i].history = alunos[i].history || [];
                alunos[i].history.push(novoTeste);
                updateStudentStats(alunos[i]);
            }

            var totalAulas = App.novaTurma.totalAulas || 0;

        function salvarTurma() {
            var nome = App.novaTurma.nome.trim();
            if (!nome) {
                alert('Por favor, insira um nome para a turma.');
                return;
            }

            for (var i = 0; i < App.classes.length; i++) {
                if (App.classes[i].name === nome) {
                    alert('Já existe uma turma com este nome. Por favor, escolha outro nome.');
                    return;
                }
            }

            var alunos = App.novaTurma.alunos || [];
            var totalGpa = 0;
            for (var j = 0; j < alunos.length; j++) {
                totalGpa += alunos[j].gpa || 0;
            }
            var average = alunos.length > 0 ? parseFloat((totalGpa / alunos.length).toFixed(1)) : 0;

            var totalAulas = App.novaTurma.totalAulas || 0;
            var stats = calcularEstatisticasTurma(alunos, totalAulas);

            var novaTurma = {
                id: 'turma-' + Date.now(),
                name: nome + ' - ' + App.novaTurma.nivel,
                studentCount: alunos.length,
                average: average,
                lastActivity: 'Criada manualmente',
                status: App.novaTurma.status || 'success',
                totalAulas: totalAulas,
                students: alunos,
                statistics: stats
            };

            App.classes.push(novaTurma);

            App.novaTurma = {
                nome: '',
                nivel: 'Ensino Básico',
                status: 'success',
                totalAulas: 0,
                alunos: [],
                statistics: {
                    averageAttendance: '0%',
                    worstQuestion: '-',
                    heatmap: { 'Interpretação': 0, 'Gramática': 0, 'Pontuação': 0, 'Ortografia': 0 }
                }
            };
            App.isCreating = false;
            App.activeTab = 'config';

            navigateTo('salas');
        }

        function cancelarTurma() {
            if (confirm('Deseja cancelar a criação da turma? Os dados não salvos serão perdidos.')) {
                App.novaTurma = {
                    nome: '',
                    nivel: 'Ensino Básico',
                    status: 'success',
                    totalAulas: 0,
                    alunos: [],
                    statistics: {
                        averageAttendance: '0%',
                        worstQuestion: '-',
                        heatmap: { 'Interpretação': 0, 'Gramática': 0, 'Pontuação': 0, 'Ortografia': 0 }
                    }
                };
                App.isCreating = false;
                App.activeTab = 'config';
                App.novaProva = { title: '', grade: 0, date: '', correct: 0, wrong: 0 };
                navigateTo('salas');
            }
        }

        function selectStudentRelatorio(studentId) {
            var cls = App.selectedClass;
            if (cls) {
                for (var i = 0; i < cls.students.length; i++) {
                    if (cls.students[i].id === studentId) {
                        App.selectedStudent = cls.students[i];
                        App.selectedHistoricalTest = null;
                        navigateTo('aluno-detalhe');
                        return;
                    }

        function downloadReport() {
            var cls = App.selectedClass;
            if (!cls) return;
            var content = 'RELATÓRIO DE DESEMPENHO: ' + cls.name + '\n\n';
            content += 'Média Geral: ' + cls.average + '\n';
            content += 'Presença Média: ' + cls.statistics.averageAttendance + '\n';
            content += 'Total de Aulas: ' + (cls.totalAulas || 0) + '\n';
            content += 'Pior Questão: ' + cls.statistics.worstQuestion + '\n\n';
            content += 'Heatmap:\n';
            for (var key in cls.statistics.heatmap) {
                content += '  ' + key + ': ' + cls.statistics.heatmap[key] + '%\n';
            }
            var students = cls.students || [];
            var aprovados = students.filter(function(s) { return s.gpa >= 7.0; }).length;
            var recuperacao = students.filter(function(s) { return s.gpa < 7.0; }).length;
            content += '\nAprovados: ' + aprovados + ' | Em Recuperação: ' + recuperacao + '\n\n';
            content += 'ALUNOS:\n';
            for (var i = 0; i < students.length; i++) {
                var s = students[i];
                var pres = calcularPresencaAluno(s, cls.totalAulas);
                content += '  ' + s.name + ' | Média: ' + s.gpa + ' | Presença: ' + pres + '% | Faltas: ' + (s
                    .faltas || 0) + '\n';
            }
            var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = 'Relatorio_' + cls.name.replace(/\s+/g, '_') + '.txt';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function handleCorrectionAndSync() {
            if (!App.studentScan || App.isProcessing) return;

            App.isProcessing = true;
            render();

            setTimeout(function() {
                var qCount = App.testDetails.qCount || 20;
                var correct = Math.floor(Math.random() * (qCount - 5)) + 5;
                var grade = parseFloat(((correct / qCount) * 10).toFixed(1));

                var clsId = App.selectedClass.id;
                var studentId = App.currentStudentId;

                var updated = App.classes.map(function(cls) {
                    if (cls.id === clsId) {
                        var updatedStudents = cls.students.map(function(std) {
                            if (std.id === studentId) {
                                var newTest = {
                                    id: 'sync-' + Date.now(),
                                    title: App.testDetails.name,
                                    grade: grade,
                                    date: 'Hoje',
                                    correct: correct,
                                    wrong: qCount - correct,
                                    details: getRandomDetails(qCount)
                                };
                                var newHistory = [newTest].concat(std.history || []);
                                var sum = 0;
                                for (var i = 0; i < newHistory.length; i++) {
                                    sum += newHistory[i].grade;
                                }
                                var avg = parseFloat((sum / newHistory.length).toFixed(1));
                                return {
                                    id: std.id,
                                    number: std.number,
                                    name: std.name,
                                    gpa: avg,
                                    lastGrade: grade,
                                    testCount: newHistory.length,
                                    successRate: std.successRate,
                                    trend: avg >= std.gpa ? 'up' : 'down',
                                    faltas: std.faltas || 0,
                                    presencas: std.presencas || 0,
                                    history: newHistory
                                };
                            }
                            return std;
                        });
                        var sumClass = 0;
                        for (var j = 0; j < updatedStudents.length; j++) {
                            sumClass += updatedStudents[j].gpa;
                        }
                        var totalAulas = cls.totalAulas || 0;
                        var stats = calcularEstatisticasTurma(updatedStudents, totalAulas);
                        return {
                            id: cls.id,
                            name: cls.name,
                            studentCount: cls.studentCount,
                            average: parseFloat((sumClass / updatedStudents.length).toFixed(1)),
                            lastActivity: App.testDetails.name,
                            status: cls.status,
                            totalAulas: totalAulas,
                            students: updatedStudents,
                            statistics: stats
                        };
                    }
                    return cls;
                });

                App.classes = updated;
                App.isProcessing = false;
                App.studentScan = null;
                App.showSyncSuccess = true;

                for (var k = 0; k < App.classes.length; k++) {
                    if (App.classes[k].id === clsId) {
                        App.selectedClass = App.classes[k];
                        break;

                    .then(function(stream) {
                        App.scanStream = stream;
                        var video = document.getElementById('scanVideo');
                        if (video) {
                            video.srcObject = stream;
                        }
                    })
                    .catch(function(err) {
                        console.warn('Câmara indisponível:', err);
                    });
            }
        }

            if (App.scanStream) {

                App.scanStream = null;

            var video = document.getElementById('scanVideo');
            var canvas = document.getElementById('scanCanvas');
            if (video && canvas) {
                var ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                var dataUrl = canvas.toDataURL('image/jpeg');
                stopScan();
                App.studentGabarito = {
                    dataUrl: dataUrl,
                    mimeType: 'image/jpeg',
                    base64: dataUrl.split(',')[1]

        function handleAiCorrection() {
            if (!App.officialGabarito) {
                App.errorMsg = 'ERRO: Carregue primeiro o Gabarito Oficial do Professor.';
                render();
                return;
            }
            if (!App.studentGabarito) {
                App.errorMsg = 'ERRO: Faça o upload ou escaner do gabarito do Aluno.';
                render();
                return;
            }

            App.errorMsg = '';
            App.isLoading = true;
            render();

            simulateCorrection().then(function(result) {
                App.lastCorrectionData = result;

                var updated = App.classes.map(function(cls) {
                    if (cls.id === App.selectedTargetClass) {
                        var updatedStudents = cls.students.map(function(std) {
                            if (std.id === App.selectedTargetStudent) {
                                return updateStudentAfterCorrection(std, result,
                                    'Correção Automática');
                            }
                            return std;
                        });
                        var sum = 0;
                        for (var i = 0; i < updatedStudents.length; i++) {
                            sum += updatedStudents[i].gpa;
                        }
                        var totalAulas = cls.totalAulas || 0;
                        var stats = calcularEstatisticasTurma(updatedStudents, totalAulas);
                        return {
                            id: cls.id,
                            name: cls.name,
                            studentCount: cls.studentCount,
                            average: parseFloat((sum / updatedStudents.length).toFixed(1)),
                            lastActivity: cls.lastActivity,
                            status: cls.status,
                            totalAulas: totalAulas,
                            students: updatedStudents,
                            statistics: stats
                        };
                    }
                    return cls;
                });

                App.classes = updated;
                App.showSyncSuccess = true;

                for (var j = 0; j < App.classes.length; j++) {
                    if (App.classes[j].id === App.selectedTargetClass) {
                        App.selectedClass = App.classes[j];
                        break;
                    }
                }

                App.isLoading = false;
                render();

                setTimeout(function() {
                    App.showSyncSuccess = false;
                    render();
                }, 4500);

                console.error(err);
                App.errorMsg = 'Erro ao processar a correção. Tente novamente.';
                App.isLoading = false;
                render();
            });
        }

                    resolve({

                        correctCount: Math.floor(Math.random() * 10) + 10,

            });

        function updateStudentAfterCorrection(student, result, testTitle) {
            var newHistory = [{
                id: 'sync-' + Date.now(),
                title: testTitle || 'Correção Automática',
                grade: parseFloat(result.grade),
                date: new Date().toLocaleDateString('pt-PT'),
                correct: result.correctCount || 15,
                wrong: result.wrongCount || 5
            }].concat(student.history || []);

            var sum = 0;
            for (var i = 0; i < newHistory.length; i++) {
                sum += newHistory[i].grade;
            }
            var newGpa = parseFloat((sum / newHistory.length).toFixed(1));

            return {
                id: student.id,
                number: student.number,
                name: student.name,
                gpa: newGpa,
                lastGrade: parseFloat(result.grade),
                testCount: newHistory.length,
                successRate: student.successRate,
                trend: newGpa >= student.gpa ? 'up' : 'down',
                faltas: student.faltas || 0,
                presencas: student.presencas || 0,
                history: newHistory
            };

                tipsHtml += '<div class="bg-gray-50 dark:bg-slate-700/50 p-4 rounded-xl border border-gray-100 dark:border-slate-600">' +
                    '<h4 class="font-bold text-gray-800 dark:text-white mb-1">' + data.tipsList[i].title +
                    '</h4><p class="text-gray-600 dark:text-slate-400">' + data.tipsList[i].desc +
                '</p></div>';
            }

            return '<div class="flex-1 flex flex-col bg-white dark:bg-slate-800 max-w-3xl mx-auto w-full">' +
                '<div class="flex items-center justify-between p-6 bg-white dark:bg-slate-800 border-b dark:border-slate-700 sticky top-0 z-10">' +
                '<button onclick="navigateTo(\'dashboard\')" class="text-gray-400 hover:text-black dark:hover:text-white transition-colors"><i class="fas fa-arrow-left text-2xl"></i></button>' +
                renderLogo('w-10 h-10') +
                renderLogoText() +
                '<div class="w-6"></div></div>' +
                '<div class="p-6 overflow-y-auto">' +
                '<div class="bg-yellow-50/50 dark:bg-slate-900 border border-yellow-200 dark:border-slate-700 rounded-2xl p-6 mb-8 text-center">' +
                '<h2 class="text-sm font-bold text-yellow-800 dark:text-yellow-400 uppercase tracking-wider leading-relaxed">Identificámos que o aluno(a) <strong class="text-black dark:text-white">' +
                data.studentName +
                '</strong> está a apresentar maiores dificuldades em <strong class="text-black dark:text-white">' +
                data.mainDifficulty + '</strong>.</h2></div>' +
                '<h3 class="text-gray-400 font-bold text-xs uppercase mb-4 tracking-widest flex items-center gap-2"><i class="fas fa-lightbulb text-sm"></i> Recomendações Práticas</h3>' +
                '<div class="space-y-6 text-sm text-gray-700 dark:text-slate-300">' + tipsHtml + '</div>' +
                '<div class="mt-10 mb-8 flex justify-center"><button onclick="downloadTips()" class="bg-[#7aa2a1] text-white px-8 py-3.5 rounded-xl text-xs font-bold tracking-widest shadow hover:bg-[#688f8e] transition-colors flex items-center gap-2">EXPORTAR DIRETRIZES EM FICHEIRO <i class="fas fa-download"></i></button></div>' +
                '</div></div>';
        }

        function downloadTips() {
            var data = App.lastCorrectionData || {
                studentName: 'Pedro H. Alves',
                grade: 8.5,
                mainDifficulty: 'Interpretação de Texto',
                tipsList: [
                    { title: "1. Leitura Focada", desc: "Ler pausadamente anotando as ideias principais." },
                    { title: "2. Ampliar Vocabulário", desc: "Anotar e pesquisar o significado de palavras desconhecidas." },
                    { title: "3. Praticar com Exercícios", desc: "Resolver questões de interpretação de textos variados." }
                ]
            };

            var content = '======================================\n';
            content += 'AUTOMATIC CORRETION - DIRETRIZES\n';
            content += '======================================\n\n';
            content += 'ALUNO: ' + data.studentName + '\n';
            content += 'NOTA: ' + data.grade + '/10\n\n';
            content += 'RECOMENDAÇÕES:\n';
            for (var i = 0; i < data.tipsList.length; i++) {
                content += '- ' + data.tipsList[i].title + '\n  ' + data.tipsList[i].desc + '\n\n';
            }

            var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = 'Sugestoes_' + data.studentName.replace(/\s+/g, '_') + '.txt';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function renderCharts() {
            var data = App.lastCorrectionData || {
                studentName: 'Pedro H. Alves',
                grade: 8.5,
                performanceDetails: [
                    { label: 'Interpretação', val1: 45, val2: 25, val3: 15 },
                    { label: 'Gramática', val1: 40, val2: 20, val3: 10 },
                    { label: 'Pontuação', val1: 35, val2: 15, val3: 5 },
                    { label: 'Escrita', val1: 50, val2: 30, val3: 20 }
                ]
            };

            var barsHtml = '';
            for (var i = 0; i < data.performanceDetails.length; i++) {
                var item = data.performanceDetails[i];
                barsHtml +=
                    '<div class="flex flex-col items-center w-16 group relative">' +
                    '<div class="w-full flex flex-col-reverse justify-start">' +
                    '<div class="w-full bg-[#3d5a5a]" style="height:' + (item.val3 * 1.2) +
                    '%; min-height:4px;"></div>' +
                    '<div class="w-full bg-[#5c8080]" style="height:' + (item.val2 * 1.2) +
                    '%; min-height:4px;"></div>' +
                    '<div class="w-full bg-[#82a9a8]" style="height:' + (item.val1 * 1.2) +
                    '%; min-height:4px;"></div></div>' +
                    '<span class="text-[10px] font-bold text-gray-500 dark:text-gray-400 text-center mt-3 absolute bottom-[-45px] leading-tight group-hover:text-black dark:group-hover:text-white">' +
                    item.label + '</span></div>';
            }

            return '<div class="flex-1 flex flex-col bg-white dark:bg-slate-800 max-w-3xl mx-auto w-full">' +
                '<div class="p-6 border-b dark:border-slate-700"><button onclick="navigateTo(\'dashboard\')" class="w-10 h-10 rounded-full border border-gray-200 dark:border-slate-700 flex items-center justify-center text-gray-400 hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors"><i class="fas fa-arrow-left text-xl"></i></button></div>' +
                '<div class="flex-1 p-6 md:p-10">' +
                '<h2 class="text-2xl font-black text-gray-700 dark:text-slate-100 uppercase flex items-center gap-2"><i class="fas fa-chart-bar text-2xl"></i> Gráficos de Evolução</h2>' +
                '<h3 class="text-md font-bold text-gray-400 mb-12">Aluno: ' + data.studentName + '</h3>' +
                '<div class="relative h-72 border-l-2 border-b-2 border-gray-300 dark:border-slate-600 ml-10 mb-20 flex items-end justify-around pb-2">' +
                '<div class="absolute -left-10 top-0 h-full flex flex-col justify-between text-[11px] text-gray-400 py-1 font-bold"><span>100%</span><span>80%</span><span>60%</span><span>40%</span><span>20%</span><span>0%</span></div>' +
                barsHtml +
                '</div><div class="flex justify-center gap-6 mt-16 text-xs font-bold text-gray-500">' +
                '<div class="flex items-center gap-2"><div class="w-4 h-4 bg-[#82a9a8] rounded"></div> Acertos</div>' +
                '<div class="flex items-center gap-2"><div class="w-4 h-4 bg-[#5c8080] rounded"></div> Parciais</div>' +
                '<div class="flex items-center gap-2"><div class="w-4 h-4 bg-[#3d5a5a] rounded"></div> Erros</div>' +
                '</div></div></div>';
        }

        function renderDiscursive() {
            var hasOfficial = App.localOfficial !== null;
            var hasStudent = App.studentAnswer !== null;

            return '<div class="flex-1 flex flex-col bg-white dark:bg-slate-800 max-w-3xl mx-auto w-full">' +
                renderSimpleHeader('Correção Discursiva com IA') +
                '<div class="flex-1 p-6 md:p-8 flex flex-col gap-6 overflow-y-auto">' +
                '<p class="text-sm text-gray-500 dark:text-gray-400 text-center max-w-md mx-auto">Compare redações e respostas livres contra o gabarito oficial de correção em segundos com o motor Gemini de Visão.</p>' +
                '<div class="grid md:grid-cols-2 gap-6">' +
                '<div class="bg-white dark:bg-slate-700 p-6 rounded-3xl border border-gray-100 dark:border-slate-600 shadow-sm flex flex-col justify-between relative overflow-hidden">' +
                '<div class="absolute top-0 left-0 w-2 h-full bg-[#7aa2a1]"></div>' +
                '<h3 class="font-bold text-gray-800 dark:text-white text-sm mb-3 pl-2 flex items-center gap-2"><i class="fas fa-check-circle text-[#7aa2a1]"></i> 1. Gabarito de Correção</h3>' +
                '<input type="file" accept="image/*" class="hidden" id="discursiveOfficial" onchange="handleDiscursiveOfficial(event)" />' +
                (hasOfficial ?
                    '<div class="relative w-full h-44 rounded-xl overflow-hidden border dark:border-slate-600"><img src="' +
                    App.localOfficial.dataUrl +
                    '" alt="Gabarito" class="w-full h-full object-cover" /><button onclick="App.localOfficial=null;render();" class="absolute top-2.5 right-2.5 bg-red-500 text-white p-1.5 rounded-full shadow hover:bg-red-600 transition-colors"><i class="fas fa-times"></i></button></div>' :
                    '<button onclick="document.getElementById(\'discursiveOfficial\').click()" class="w-full flex-1 min-h-44 bg-[#e8f1f1] dark:bg-slate-600/50 rounded-xl flex flex-col items-center justify-center text-gray-400 hover:opacity-80 transition-opacity"><i class="fas fa-upload text-3xl mb-2 text-[#7aa2a1]"></i><span class="text-xs font-bold uppercase tracking-wider text-[#7aa2a1]">Carregar Gabarito</span></button>') +
                '</div>' +
                '<div class="bg-white dark:bg-slate-700 p-6 rounded-3xl border border-gray-100 dark:border-slate-600 shadow-sm flex flex-col justify-between relative overflow-hidden">' +
                '<div class="absolute top-0 left-0 w-2 h-full bg-[#7aa2a1]"></div>' +
                '<h3 class="font-bold text-gray-800 dark:text-white text-sm mb-3 pl-2 flex items-center gap-2"><i class="fas fa-qrcode text-[#7aa2a1]"></i> 2. Resposta do Aluno</h3>' +
                '<input type="file" accept="image/*" class="hidden" id="discursiveStudent" onchange="handleDiscursiveStudent(event)" />' +
                (hasStudent ?
                    '<div class="relative w-full h-44 rounded-xl overflow-hidden border dark:border-slate-600"><img src="' +
                    App.studentAnswer.dataUrl +
                    '" alt="Aluno" class="w-full h-full object-cover" /><button onclick="App.studentAnswer=null;render();" class="absolute top-2.5 right-2.5 bg-red-500 text-white p-1.5 rounded-full shadow hover:bg-red-600 transition-colors"><i class="fas fa-times"></i></button></div>' :
                    '<button onclick="document.getElementById(\'discursiveStudent\').click()" class="w-full flex-1 min-h-44 bg-[#e8f1f1] dark:bg-slate-600/50 rounded-xl flex flex-col items-center justify-center text-gray-400 hover:opacity-80 transition-opacity"><i class="fas fa-upload text-3xl mb-2 text-[#7aa2a1]"></i><span class="text-xs font-bold uppercase tracking-wider text-[#7aa2a1]">Carregar Prova</span></button>') +
                '</div></div>' +
                (App.errorMsg ?
                    '<div class="text-red-500 text-xs text-center font-bold bg-red-50 dark:bg-red-950/20 p-3 rounded-xl border border-red-100 dark:border-red-900">' +
                    App.errorMsg + '</div>' : '') +
                '<div class="mt-auto pt-6 flex justify-center"><button onclick="handleDiscursiveAnalyze()" ' +
                (App.isAnalyzing ? 'disabled' : '') +
                ' class="w-full max-w-md py-4 rounded-xl font-bold text-white shadow-md flex items-center justify-center gap-2 transition-all ' +
                (App.isAnalyzing ? 'bg-gray-400 cursor-not-allowed' :
                    'bg-[#7aa2a1] hover:bg-[#688f8e] active:scale-95') + '">' +
                (App.isAnalyzing ? '<i class="fas fa-sync-alt animate-spin"></i> A analisar Redação...' :
                    '<i class="fas fa-lightbulb"></i> Realizar Correção por IA') +
                '</button></div></div></div>';
        }

        function handleDiscursiveOfficial(event) {
            var file = event.target.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onloadend = function() {
                    App.localOfficial = {
                        dataUrl: reader.result,
                        mimeType: file.type,
                        base64: reader.result.split(',')[1]
                    };
                    render();
                };
                reader.readAsDataURL(file);
            }
        }

        function handleDiscursiveStudent(event) {
            var file = event.target.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onloadend = function() {
                    App.studentAnswer = {
                        dataUrl: reader.result,
                        mimeType: file.type,
                        base64: reader.result.split(',')[1]
                    };
                    render();
                };
                reader.readAsDataURL(file);
            }
        }

        function handleDiscursiveAnalyze() {
            if (!App.localOfficial || !App.studentAnswer) {
                App.errorMsg = 'Por favor, certifique-se de que o gabarito oficial e a prova do aluno estão carregados.';
                render();
                return;
            }

            App.errorMsg = '';
            App.isAnalyzing = true;
            render();

            setTimeout(function() {
                App.aiResult =
                    '**Avaliação Pedagógica de Teste**\n\n**Aluno:** Pedro H. Alves\n\n**Nota Obtida: 8.5/10**\n\n**Análise do Professor:**\n* **Pontos Positivos:** Vocabulário excelente e argumentos lógicos fundamentados.\n* **Melhoria sugerida:** O aluno deve sintetizar os exemplos no encerramento da prova discursiva.\n* **Competências Desenvolvidas:** Capacidade de análise crítica e organização textual.\n\n**Recomendações:**\n- Praticar a escrita de conclusões mais concisas\n- Revisar a estrutura de parágrafos\n- Ampliar repertório de conectivos';
                App.isAnalyzing = false;
                navigateTo('ai_result');
            }, 2000);
        }

        function renderAiResult() {
            var result = App.aiResult || 'Nenhum resultado disponível.';

            var paragraphs = result.split('\n');
            var html = '';
            for (var i = 0; i < paragraphs.length; i++) {
                var p = paragraphs[i];
                if (!p.trim()) continue;
                var parts = p.split(/(\*\*.*?\*\*)/g);
                var line = '<p class="mb-3 text-sm text-gray-700 dark:text-slate-300 leading-relaxed">';
                for (var j = 0; j < parts.length; j++) {
                    var part = parts[j];
                    if (part && part.startsWith('**') && part.endsWith('**')) {
                        line += '<strong class="text-gray-900 dark:text-white font-bold">' + part.slice(2, -2) +
                            '</strong>';
                    } else if (part && part.startsWith('* ')) {
                        line += '<span class="flex gap-2 pl-2"><span class="text-[#7aa2a1]">•</span>' + part.slice(
                            2) + '</span>';
                    } else {
                        line += part || '';
                    }
                }
                line += '</p>';
                html += line;
            }

            return '<div class="min-h-full flex flex-col bg-white dark:bg-slate-800 max-w-3xl mx-auto w-full transition-colors">' +
                renderSimpleHeader('Resultado da Avaliação por IA') +
                '<div class="flex-1 p-6 overflow-y-auto">' +
                '<div class="bg-[#e8f1f1] dark:bg-slate-700/50 p-6 rounded-2xl shadow-inner border dark:border-slate-600">' +
                '<div class="flex items-center gap-3 mb-6 border-b dark:border-slate-600 pb-4">' +
                '<div class="w-10 h-10 bg-white dark:bg-slate-700 rounded-full flex items-center justify-center shadow-sm">' +
                renderLogo('w-6 h-6') +
                renderLogoText() +
                '</div></div>' +
                '<div class="prose prose-sm max-w-none">' + html +
                '</div></div><button onclick="navigateTo(\'dashboard\')" class="mt-8 w-full btn-solid flex items-center justify-center gap-2"><i class="fas fa-check-circle"></i> Voltar ao Painel</button>' +
                '</div></div>';
        }

        // ============================================================
        // INICIAR
        // ============================================================
        render();
    </script>
</body>
</html>
